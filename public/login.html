
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>

<style>
body { background:#dff5f9; font-family:Arial; text-align:center; }

.navbar { background:#00a6b6; display:flex; justify-content:space-around; padding:10px; color:white; }

.container {
  background:white; width:350px; margin:auto; margin-top:50px;
  padding:25px; border-radius:15px;
}

input { width:90%; padding:10px; margin:10px; }
button { padding:10px 20px; background:#00a6b6; color:white; border:none; border-radius:8px; }
</style>
</head>

<body>

<div class="navbar">
  <button class="nav-btn" onclick="go('index.html')">الرئيسية</button>
  <button class="nav-btn" onclick="go('check.html')">فحص الحالة</button>
  <button class="nav-btn" onclick="go('advice.html')">النصائح الطبية</button>
  <button class="nav-btn" onclick="openHospitals()">المستشفيات القريبة</button>
  <button class="nav-btn" onclick="go('login.html')">تسجيل الدخول</button>
</div>

<div class="container">
  <h2>تسجيل الدخول</h2>
  <input id="user" placeholder="اسم المستخدم"><br>
  <input id="pass" type="password" placeholder="كلمة المرور"><br>
  <button onclick="login()">دخول</button>
  <p id="error" style="color:red;"></p>
</div>

<script>
function go(p){ location.href=p; }

function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u!=="" && p!==""){
    location.href="check.html";
  } else {
    document.getElementById("error").innerText="يرجى إدخال البيانات";
  }
}
</script>

</body>
</html>
