
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تقييم حالة الطفل</title>

<style>
body {
  background:#dff5f9;
  font-family:Arial;
  text-align:center;
}

/* الشريط العلوي */
.navbar {
  background:#00a6b6;
  display:flex;
  justify-content:space-around;
  padding:10px;
  color:white;
}

/* الحاوية */
.container {
  background:white;
  width:400px;
  margin:auto;
  margin-top:30px;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* الحقول */
input, select, button {
  padding:10px;
  margin:8px;
  width:80%;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}

/* أزرار رئيسية */
button {
  background:#00a6b6;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover {
  background:#028c9a;
}

/* زر اللغة */
#langBtn {
  background:#f2f2f2;
  color:#333;
}

/* النتيجة */
.result {
  font-size:22px;
  margin-top:20px;
  font-weight:bold;
}

/* زر التالي */
#nextBtn {
  background:#4caf50;
}
#nextBtn:hover {
  background:#3e8e41;
}
</style>
</head>

<body>

<!-- الشريط العلوي -->
<div class="navbar">
  <button class="nav-btn" onclick="go('index.html')">الرئيسية</button>
  <button class="nav-btn" onclick="go('check.html')">فحص الحالة</button>
  <button class="nav-btn" onclick="go('advice.html')">النصائح الطبية</button>
  <button class="nav-btn" onclick="openHospitals()">المستشفيات القريبة</button>
  <button class="nav-btn" onclick="go('login.html')">تسجيل الدخول</button>
</div>

<div class="container">

  <!-- زر تغيير اللغة -->
  <button id="langBtn" onclick="changeLang()">🌐 تغيير اللغة</button>

  <h2 id="title">تقييم حالة الطفل</h2>

  <!-- العمر -->
  <label id="ageLabel">العمر:</label><br>
  <select id="age">
    <option value="baby">أقل من سنة</option>
    <option value="toddler">1 - 3 سنوات</option>
    <option value="child">أكثر من 3 سنوات</option>
  </select><br>

  <!-- الحرارة -->
  <label id="tempLabel">درجة الحرارة:</label><br>
  <input type="number" id="temp" placeholder="مثال: 38.5"><br>

  <!-- الأعراض -->
  <label id="vomitLabel">هل يوجد قيء؟</label><br>
  <select id="vomit">
    <option value="no">لا</option>
    <option value="yes">نعم</option>
  </select><br>

  <label id="diarrheaLabel">هل يوجد إسهال؟</label><br>
  <select id="diarrhea">
    <option value="no">لا</option>
    <option value="yes">نعم</option>
  </select><br>

  <!-- الأزرار -->
  <button id="checkBtn" onclick="check()">🩺 تقييم الحالة</button>
  <button id="hospitalBtn2" onclick="openHospitals()">🏥 أقرب مستشفى</button>
  <button id="nextBtn" onclick="go('allergy.html')">➡️ التالي</button>

  <div class="result" id="result"></div>

</div>

<script>
let lang = "ar";

function go(p){ location.href=p; }

function openHospitals(){
  window.open("https://www.google.com/maps/search/مستشفى+قريب+مني");
}

/* تغيير اللغة */
function changeLang(){
  const e = {
    title: document.getElementById("title"),
    ageLabel: document.getElementById("ageLabel"),
    tempLabel: document.getElementById("tempLabel"),
    vomitLabel: document.getElementById("vomitLabel"),
    diarrheaLabel: document.getElementById("diarrheaLabel"),
    checkBtn: document.getElementById("checkBtn"),
    hospitalBtn: document.getElementById("hospitalBtn2"),
    nextBtn: document.getElementById("nextBtn"),
    age: document.getElementById("age"),
    vomit: document.getElementById("vomit"),
    diarrhea: document.getElementById("diarrhea"),
    tempInput: document.getElementById("temp"),
    homeBtn: document.getElementById("homeBtn"),
    checkPageBtn: document.getElementById("checkPageBtn"),
    adviceBtn: document.getElementById("adviceBtn"),
    hospitalBtnNav: document.getElementById("hospitalBtn"),
    loginBtn: document.getElementById("loginBtn"),
    langBtn: document.getElementById("langBtn")
  };

  if(lang==="ar"){
    lang="en";

    e.title.innerText = "Child Health Check";
    e.ageLabel.innerText = "Age:";
    e.tempLabel.innerText = "Temperature:";
    e.tempInput.placeholder = "Example: 38.5";
    e.vomitLabel.innerText = "Vomiting?";
    e.diarrheaLabel.innerText = "Diarrhea?";
    e.checkBtn.innerText = "🩺 Check Condition";
    e.hospitalBtn.innerText = "🏥 Nearest Hospital";
    e.nextBtn.innerText = "➡️ Next";
    e.langBtn.innerText = "🌐 Change Language";

    e.age.options[0].text = "Under 1 year";
    e.age.options[1].text = "1 - 3 years";
    e.age.options[2].text = "Over 3 years";

    e.vomit.options[0].text = "No";
    e.vomit.options[1].text = "Yes";
    e.diarrhea.options[0].text = "No";
    e.diarrhea.options[1].text = "Yes";

    e.homeBtn.innerText = "🏠 Home";
    e.checkPageBtn.innerText = "🩺 Check";
    e.adviceBtn.innerText = "📝 Advice";
    e.hospitalBtnNav.innerText = "🏥 Hospital";
    e.loginBtn.innerText = "🚪 Login";

  } else {
    lang="ar";

    e.title.innerText = "تقييم حالة الطفل";
    e.ageLabel.innerText = "العمر:";
    e.tempLabel.innerText = "درجة الحرارة:";
    e.tempInput.placeholder = "مثال: 38.5";
    e.vomitLabel.innerText = "هل يوجد قيء؟";
    e.diarrheaLabel.innerText = "هل يوجد إسهال؟";
    e.checkBtn.innerText = "🩺 تقييم الحالة";
    e.hospitalBtn.innerText = "🏥 أقرب مستشفى";
    e.nextBtn.innerText = "➡️ التالي";
    e.langBtn.innerText = "🌐 تغيير اللغة";

    e.age.options[0].text = "أقل من سنة";
    e.age.options[1].text = "1 - 3 سنوات";
    e.age.options[2].text = "أكثر من 3 سنوات";

    e.vomit.options[0].text = "لا";
    e.vomit.options[1].text = "نعم";
    e.diarrhea.options[0].text = "لا";
    e.diarrhea.options[1].text = "نعم";

    e.homeBtn.innerText = "🏠";
    e.checkPageBtn.innerText = "🩺";
    e.adviceBtn.innerText = "📝";
    e.hospitalBtnNav.innerText = "🏥";
    e.loginBtn.innerText = "🚪";
  }
}

/* النطق الصوتي */
function speak(text){
  let msg = new SpeechSynthesisUtterance(text);
  msg.lang = (lang==="ar") ? "ar-SA" : "en-US";
  speechSynthesis.speak(msg);
}

/* التقييم الذكي */
function check(){
  let temp = parseFloat(document.getElementById("temp").value);
  let v = document.getElementById("vomit").value;
  let d = document.getElementById("diarrhea").value;

  let res = "";
  let color = "green";

  if(isNaN(temp)){
    alert(lang==="ar" ? "أدخلي درجة الحرارة" : "Enter temperature");
    return;
  }

  if(temp < 37.5 && v==="no" && d==="no"){
    res = (lang==="ar") ? "الحالة طبيعية 🟢" : "Normal condition 🟢";
    color="green";
  }
  else if(temp >= 37.5 && temp < 38.5){
    res = (lang==="ar") ? "حرارة بسيطة 🟡 راقبي الطفل" : "Mild fever 🟡 Monitor the child";
    color="orange";
  }
  else if(temp >= 38.5 && (v==="yes" || d==="yes")){
    res = (lang==="ar") ? "حالة خطيرة 🔴 يجب مراجعة الطبيب فورًا" : "Serious condition 🔴 See a doctor immediately";
    color="red";
  }
  else if(temp >= 38.5){
    res = (lang==="ar") ? "حرارة مرتفعة 🔴 يفضّل مراجعة الطبيب" : "High fever 🔴 Doctor recommended";
    color="red";
  }
  else{
    res = (lang==="ar") ? "حالة متوسطة 🟡 تحتاج متابعة" : "Moderate condition 🟡 Needs monitoring";
    color="orange";
  }

  let box = document.getElementById("result");
  box.innerText = res;
  box.style.color = color;

  speak(res);
}
</script>

</body>
</html>
